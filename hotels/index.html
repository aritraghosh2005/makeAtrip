<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stays & Villas — Voyara</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../voyara.css">
    <style>
        /* ── LAYOUT ── */
        .stays-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            border-top: var(--border);
            min-height: 80vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            border-right: var(--border);
            padding: 0;
            position: sticky;
            top: 62px;
            height: calc(100vh - 62px);
            overflow-y: auto;
            background: var(--cream);
        }
        .sidebar-header {
            background: var(--brown);
            padding: 20px 24px;
            border-bottom: var(--border);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem; letter-spacing: 0.1em;
            color: var(--cream);
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-header i { color: var(--coral); }

        .filter-group { border-bottom: var(--border); padding: 20px 24px; }
        .filter-group-title {
            font-size: 0.6rem; font-weight: 700;
            letter-spacing: 0.22em; text-transform: uppercase;
            color: var(--brown); margin-bottom: 14px;
        }
        .filter-btn {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 11px 14px;
            background: transparent; border: 2px solid var(--black);
            margin-bottom: 8px; cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.78rem; font-weight: 500;
            color: var(--black); text-align: left;
            transition: all 0.15s;
        }
        .filter-btn:hover { background: var(--cream-dark); transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--black); }
        .filter-btn.active { background: var(--brown); color: var(--cream); box-shadow: 4px 4px 0 var(--black); }
        .filter-btn .count { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--coral); }
        .filter-btn.active .count { color: var(--cream); }

        /* ── MAIN CONTENT & HOTEL GRID (MATCHES TOURS) ── */
        .stays-main { padding: 40px 44px 80px; }
        .stays-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .stays-count { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--brown); }
        .stays-count strong { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--black); display: block; line-height: 1; }

        .hotel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            border-left: var(--border);
            border-top: var(--border);
        }

        .hotel-grid .card {
            border-right: var(--border); border-bottom: var(--border);
            background: white; display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }
        .hotel-grid .card:hover { z-index: 2; }

        .hotel-grid .badge {
            position: absolute; top: 0; left: 0; z-index: 2;
            background: var(--brown); color: var(--cream);
            border-right: var(--border); border-bottom: var(--border);
            padding: 7px 14px; font-family: 'Space Grotesk', sans-serif;
            font-size: 0.6rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
        }

        .hotel-grid .img-container {
            height: 220px; overflow: hidden;
            border-bottom: var(--border); position: relative;
        }
        .hotel-grid .img-container img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s, filter 0.4s; filter: sepia(15%);
        }
        .hotel-grid .card:hover .img-container img { transform: scale(1.07); filter: sepia(0%); }

        .hotel-grid .card-content {
            padding: 22px 22px 18px; flex: 1; display: flex; flex-direction: column;
        }
        .hotel-grid .card-content h2 {
            font-family: 'Bebas Neue', sans-serif; font-size: 1.55rem;
            color: var(--black); line-height: 1; margin-bottom: 10px;
        }
        .hotel-grid .card-content p {
            font-size: 0.8rem; line-height: 1.65; color: #5a3e2b;
            flex: 1; margin-bottom: 14px; font-family: 'Space Grotesk', sans-serif;
        }

        .hotel-grid .price-tag {
            font-family: 'Bebas Neue', sans-serif; font-size: 1.75rem;
            color: var(--brown); line-height: 1; margin-bottom: 16px; display: block;
            border-top: 2px solid #eee; padding-top: 12px;
        }
        .hotel-grid .price-tag span {
            font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem;
            font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
            color: #888; display: block; margin-top: 2px;
        }

        .hotel-grid .card-content .btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--brown); color: var(--cream);
            border: var(--border); box-shadow: var(--shadow);
            padding: 11px 18px; width: 100%; justify-content: center;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.72rem;
            font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
        }
        .hotel-grid .card:hover .card-content .btn {
            background: var(--coral); color: var(--black);
            transform: translate(-2px,-2px); box-shadow: var(--shadow-lg);
        }

        @media (max-width: 900px) {
            .stays-layout { grid-template-columns: 1fr; }
            .sidebar { position: static; height: auto; border-right: none; border-bottom: var(--border); }
            .stays-main { padding: 28px 24px 60px; }
            .hotel-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="topnav">
        <a class="nav-logo" href="../index.html">
            <div class="nav-logo-dot"></div>
            <span>Voyara</span>
        </a>
        <ul class="nav-links">
            <li><a href="../tours_and_destinations/tours_index.html"><i class="fa-solid fa-map-location-dot"></i> Tours</a></li>
            <li><a href="index.html" class="active"><i class="fa-solid fa-hotel"></i> Stays</a></li>
            <li><a href="../travel/index.html"><i class="fa-solid fa-plane-departure"></i> Travel</a></li>
        </ul>
        <button class="nav-cta" onclick="alert('Login feature coming soon!')">
            <i class="fa-solid fa-circle-user"></i> My Account
        </button>
    </nav>

    <div class="page-wrap">
        <div class="page-hero">
            <div>
                <div class="page-hero-label"><i class="fa-solid fa-hotel"></i> Stays & Villas</div>
                <h1 class="page-hero-title"><span class="outlined">Stay</span><br>In Comfort</h1>
                <p class="page-hero-desc">Handpicked resorts, cozy homestays and heritage villas across our 26 premium destinations.</p>
            </div>
            <div class="page-hero-actions">
                <a class="btn-secondary" href="../tours_and_destinations/bookings.html"><i class="fa-solid fa-ticket"></i> My Bookings</a>
            </div>
        </div>

        <div class="breadcrumb">
            <a href="../index.html">Home</a><span class="sep">/</span><span class="current">Stays & Villas</span>
        </div>

        <div class="stays-layout">
            <aside class="sidebar">
                <div class="sidebar-header"><i class="fa-solid fa-sliders"></i> Filter Stays</div>
                <div class="filter-group" id="filterContainer">
                    <div class="filter-group-title">By Location</div>
                    </div>
            </aside>

            <main class="stays-main">
                <div class="stays-top">
                    <div class="stays-count">
                        <strong id="visibleCount">0</strong>
                        Stays Available
                    </div>
                </div>
                <div class="hotel-grid" id="hotelGrid">
                    </div>
            </main>
        </div>
    </div>

    <div class="modal-overlay" id="bookingModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Book Your Stay</h2>
                <div class="modal-close" onclick="closeModal()">✕</div>
            </div>
            <div class="modal-body">
                <label>Accommodation</label>
                <input type="text" id="activityName" readonly>
                <label>Check-in Date</label>
                <input type="date" id="bookingDate" required>
                <label>Number of Rooms</label>
                <input type="number" id="numPersons" min="1" value="1" required>
                <div class="modal-total">
                    <span>Total Amount</span>
                    <span class="total-amount">₹<span id="displayTotal">0</span></span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-coral" style="width:100%;justify-content:center;" id="confirmBtn">
                    <i class="fa-solid fa-check"></i> Confirm Booking
                </button>
            </div>
        </div>
    </div>

    <script src="stays_script.js"></script>
</body>
</html>
