<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Stays — Voyara</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../voyara.css">
    <style>
        .stays-section { padding: 56px 60px 80px; }
        .section-label { display: inline-flex; align-items: center; gap: 8px; background: var(--coral); border: var(--border); padding: 6px 16px; margin-bottom: 14px; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; }
        .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.2rem, 4vw, 3.4rem); letter-spacing: 0.03em; line-height: 1; margin-bottom: 36px; }

        /* Hotel Grid - FORCED 3 ITEMS PER ROW TO MATCH TOURS */
        #hotel-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* Exactly 3 per row */
            gap: 30px; 
        }
        
        #hotel-container .card { border: var(--border); background: white; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        #hotel-container .card:hover { z-index: 2; box-shadow: var(--shadow-lg); transform: translateY(-5px); transition: all 0.3s ease; }
        #hotel-container .img-container { height: 240px; overflow: hidden; border-bottom: var(--border); position: relative; }
        #hotel-container .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s, filter 0.4s; filter: sepia(10%); }
        #hotel-container .card:hover .img-container img { transform: scale(1.06); filter: sepia(0%); }
        
        #hotel-container .card-content { padding: 26px; flex: 1; display: flex; flex-direction: column; }
        #hotel-container .card-content h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--black); line-height: 1; margin-bottom: 10px; }
        #hotel-container .card-content p { font-size: 0.82rem; line-height: 1.65; color: #5a3e2b; flex: 1; margin-bottom: 14px; }
        #hotel-container .price-tag { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--brown); margin-bottom: 16px; border-top: 2px solid #eee; padding-top: 12px; }
        #hotel-container .price-tag span { font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888; display: block; margin-top: 4px; }
        
        #hotel-container .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--brown); color: var(--cream); border: var(--border); box-shadow: var(--shadow); padding: 12px 18px; width: 100%; font-family: 'Space Grotesk', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: transform 0.12s, box-shadow 0.12s, background 0.12s; }
        #hotel-container .card:hover .btn { background: var(--coral); color: var(--black); transform: translate(-2px,-2px); box-shadow: var(--shadow-lg); }

        @media (max-width: 1024px) { #hotel-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { #hotel-container { grid-template-columns: 1fr; } .stays-section { padding: 36px 24px 60px; } }
    </style>
</head>
<body>

    <nav class="topnav">
        <a class="nav-logo" href="../index.html"><div class="nav-logo-dot"></div><span>Voyara</span></a>
        <ul class="nav-links">
            <li><a href="../tours_and_destinations/tours_index.html"><i class="fa-solid fa-map-location-dot"></i> Tours</a></li>
            <li><a href="index.html" class="active"><i class="fa-solid fa-hotel"></i> Stays</a></li>
            <li><a href="../travel/index.html"><i class="fa-solid fa-plane-departure"></i> Travel</a></li>
        </ul>
        <div class="nav-spacer"></div>
        <button class="nav-cta" onclick="alert('Login coming soon!')"><i class="fa-solid fa-circle-user"></i> My Account</button>
    </nav>

    <div class="page-wrap">
        <div class="page-hero">
            <div>
                <div class="page-hero-label"><i class="fa-solid fa-location-dot"></i> City Stays</div>
                <h1 class="page-hero-title" id="page-title">Loading...</h1>
            </div>
            <div class="page-hero-actions">
                <a class="btn-secondary" href="../tours_and_destinations/bookings.html"><i class="fa-solid fa-ticket"></i> My Bookings</a>
                <a class="btn-secondary" href="index.html"><i class="fa-solid fa-arrow-left"></i> All Cities</a>
            </div>
        </div>

        <div class="breadcrumb">
            <a href="../index.html">Home</a><span class="sep">/</span>
            <a href="index.html">Stays & Villas</a><span class="sep">/</span>
            <span class="current" id="breadcrumb-city">Loading...</span>
        </div>

        <div class="stays-section">
            <div class="section-label"><i class="fa-solid fa-bed"></i> Available Accommodations</div>
            <h2 class="section-title" id="section-subtitle">Stays in City</h2>
            <main id="hotel-container"></main>
        </div>
    </div>

    <div class="modal-overlay" id="bookingModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Book Your Stay</h2>
                <div class="modal-close" onclick="closeModal()">✕</div>
            </div>
            <div class="modal-body">
                <label>Accommodation</label>
                <input type="text" id="activityName" readonly>
                <label>Check-in Date</label>
                <input type="date" id="bookingDate" required>
                <label>Number of Rooms</label>
                <input type="number" id="numPersons" min="1" value="1" required>
                <div class="modal-total">
                    <span>Total Amount</span>
                    <span class="total-amount">₹<span id="displayTotal">0</span></span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-coral" style="width:100%;justify-content:center;" id="confirmBtn">
                    <i class="fa-solid fa-check"></i> Confirm Booking
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="stays_script.js"></script>
</body>
</html>
