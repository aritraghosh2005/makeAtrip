<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Activities</title>
    <link rel="stylesheet" href="destinations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="hero-section">
        <div id="navigation">
            <button class="btn" onclick="location.href='bookings.html'">View Bookings</button>
        </div>
        <h1 id="page-title">Loading...</h1>
    </header>

    <main class="container" id="activity-container"></main>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>Book Your Activity</h2>
            <form id="bookingForm">
                <label>Activity:</label>
                <input type="text" id="activityName" readonly>
                <label>Select Date:</label>
                <input type="date" id="bookingDate" required>
                <label>Persons:</label>
                <input type="number" id="numPersons" min="1" value="1" required>
                <div class="total-price">Total: ₹<span id="displayTotal">0</span></div>
                <button type="submit" class="btn">Confirm & Save</button>
            </form>
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 50px;">
        <button class="btn" onclick="location.href='tours_index.html'">Back to Cities</button>
    </div>

    <script src="tours_script.js"></script>
</body>
</html>
